name: Linear → continue (real-time)

# Fired by app/api/linear-webhook/route.ts (repository_dispatch) when a delivery gate
# is approved in Linear. Confirms the gate, then continues the next stage headlessly.
on:
  repository_dispatch:
    types: [linear-gate-approved]
  workflow_dispatch: {} # allow manual run for testing

permissions:
  contents: write
  pull-requests: write

# One continuation at a time. The gate-approval webhook can re-fire — a stage that clears
# `awaiting-you` triggers another repository_dispatch — so serialize to stop overlapping
# headless runs stacking up. cancel-in-progress: false = let an in-flight build finish.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  continue:
    runs-on: ubuntu-latest
    # Declared at job level so the `if:` expressions below can read env.CLAUDE_CODE_OAUTH_TOKEN.
    # GitHub Actions only exposes workflow/job-level env to `if:` — a step-level env: is invisible there.
    env:
      # Bills the owner's Claude subscription (the "package"), NOT pay-as-you-go API credits.
      # Generate with `claude setup-token` and store as the CLAUDE_CODE_OAUTH_TOKEN repo secret.
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install --no-audit --no-fund

      - name: Provision .env for tools
        run: |
          printf 'LINEAR_API_KEY=%s\nLINEAR_TEAM_KEY=%s\n' \
            "${{ secrets.LINEAR_API_KEY }}" "${{ vars.LINEAR_TEAM_KEY || 'CAM' }}" > .env

      - name: Confirm a gate is actually cleared
        id: gates
        run: |
          node scripts/linear-sync.mjs gates
          echo "code=$?" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: No cleared gate → stop
        if: steps.gates.outputs.code != '10'
        run: echo "No cleared gate (status:gates exit ${{ steps.gates.outputs.code }}). Nothing to continue."

      - name: Continue the next stage (headless orchestrator)
        if: steps.gates.outputs.code == '10' && env.CLAUDE_CODE_OAUTH_TOKEN != ''
        env:
          TRIGGER_ISSUE: ${{ github.event.client_payload.identifier }}
          TRIGGER_EPIC: ${{ github.event.client_payload.epic }}
        run: |
          npm i -g @anthropic-ai/claude-code
          claude -p "บทบาท: orchestrator ของ CampVibe (อ่าน CLAUDE.md + ai-planning/SYNC-ARCHITECTURE.md ก่อน).
          มี gate ถูก approve ใน Linear แล้ว (issue $TRIGGER_ISSUE, epic '$TRIGGER_EPIC'; npm run status:gates คืน CLEARED).
          งานของคุณ: เดิน stage ถัดไปของ epic นั้นต่อ ตามลำดับ orchestrator.
          กฎเหล็ก: ทำงานบน branch ใหม่เท่านั้น ห้ามแตะ main · ถ้ามีโค้ดให้เปิด **draft PR** (ห้าม merge) ·
          อัปเดตสถานะทุก transition ด้วย 'node scripts/linear-sync.mjs set <id> --state <state>' ·
          จบแล้วสรุปสั้น ๆ ว่าทำอะไร + ลิงก์ PR." \
            --dangerously-skip-permissions

      - name: Gate cleared but autonomous continuation disabled
        if: steps.gates.outputs.code == '10' && env.CLAUDE_CODE_OAUTH_TOKEN == ''
        run: |
          echo "::notice::Gate cleared for ${{ github.event.client_payload.identifier }}." \
               "Set the CLAUDE_CODE_OAUTH_TOKEN secret (run 'claude setup-token') to enable autonomous continuation, or pick it up in a session."
