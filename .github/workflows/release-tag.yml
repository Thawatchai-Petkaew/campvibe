name: Release Tag

# Manually create a git tag + GitHub Release at a given commit.
# Why this exists: Claude Code web sessions cannot push tags (git proxy 403,
# and the GitHub MCP exposes no tag/release create tool). The Actions runner
# uses GITHUB_TOKEN, which can create tags/releases server-side — so a release
# cut from a web session can still be tagged via `workflow_dispatch`.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name, e.g. v0.8.4"
        required: true
        type: string
      sha:
        description: "Commit SHA to tag (defaults to the dispatched ref)"
        required: false
        type: string
      notes:
        description: "Release notes (markdown)"
        required: false
        type: string
      prerelease:
        description: "Mark as a pre-release"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create tag + release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
          INPUT_SHA: ${{ inputs.sha }}
          NOTES: ${{ inputs.notes }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          set -euo pipefail

          # Guard the tag name (semver-ish, no shell metacharacters).
          if ! printf '%s' "$TAG" | grep -Eq '^v?[0-9A-Za-z._-]+$'; then
            echo "::error::Invalid tag name: $TAG"
            exit 1
          fi

          TARGET="${INPUT_SHA:-$GITHUB_SHA}"

          # Idempotent: skip if a release with this tag already exists.
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG already exists — skipping (idempotent)."
            exit 0
          fi

          if [ -z "$NOTES" ]; then
            NOTES="Release $TAG"
          fi

          PRE_FLAG=()
          if [ "$PRERELEASE" = "true" ]; then
            PRE_FLAG=(--prerelease)
          fi

          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$TARGET" \
            --title "$TAG" \
            --notes "$NOTES" \
            "${PRE_FLAG[@]}"

          echo "Created tag + release $TAG at $TARGET"
