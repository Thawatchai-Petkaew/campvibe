name: CI

on:
  pull_request:
    branches: [main, staging]
  push:
    branches: [main, staging]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # npm install (not ci): vitest4/rolldown ships wasm32-wasi optional bindings
      # whose nested @emnapi deps are pruned from the lockfile on macOS, so `npm ci`
      # fails the cross-platform lock-sync check on linux. install honors the lock.
      - run: npm install --no-audit --no-fund
      - name: Lint
        run: npm run lint
      - name: Palette guard (no hardcoded colours)
        run: npm run check:palette
      - name: Type check
        run: npm run typecheck
      - name: Test + coverage
        run: npm test -- --coverage
      - name: Build
        run: npm run build
      - name: Security audit
        run: npm audit --omit=dev --audit-level=high

  # Post-deploy smoke against the env's live URL. Opt-in: set repo variables
  # STAGING_URL / PROD_URL (Settings → Secrets and variables → Actions → Variables).
  # If the matching var is unset it skips (so main pushes never fail before staging exists).
  smoke:
    needs: quality-gate
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Smoke (curl deployed URL if configured)
        run: |
          URL=""
          [ "${{ github.ref_name }}" = "main" ] && URL="${{ vars.PROD_URL }}"
          [ "${{ github.ref_name }}" = "staging" ] && URL="${{ vars.STAGING_URL }}"
          if [ -z "$URL" ]; then
            echo "::notice::No URL variable for '${{ github.ref_name }}' — skipping smoke."
            exit 0
          fi
          echo "Smoking $URL (waits for Vercel deploy) ..."
          for i in $(seq 1 12); do
            code=$(curl -s -o /dev/null -w '%{http_code}' "$URL" || true)
            echo "attempt $i: HTTP $code"
            [ "$code" = "200" ] && echo "✓ smoke ok" && exit 0
            sleep 15
          done
          echo "::error::Smoke failed for $URL (no HTTP 200 within ~3min)"
          exit 1
