name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # npm install (not ci): vitest4/rolldown ships wasm32-wasi optional bindings
      # whose nested @emnapi deps are pruned from the lockfile on macOS, so `npm ci`
      # fails the cross-platform lock-sync check on linux. install honors the lock.
      - run: npm install --no-audit --no-fund
      - name: Lint
        run: npm run lint
      - name: Type check
        run: npm run typecheck
      - name: Test + coverage
        run: npm test -- --coverage
      - name: Build
        run: npm run build
      - name: Security audit
        run: npm audit --omit=dev --audit-level=high
