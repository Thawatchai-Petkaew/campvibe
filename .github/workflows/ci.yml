name: CI

on:
  pull_request:
    branches: [main, staging]
  push:
    branches: [main, staging]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # npm install (not ci): vitest4/rolldown ships wasm32-wasi optional bindings
      # whose nested @emnapi deps are pruned from the lockfile on macOS, so `npm ci`
      # fails the cross-platform lock-sync check on linux. install honors the lock.
      - run: npm install --no-audit --no-fund
      - name: Lint
        run: npm run lint
      - name: Palette guard (no hardcoded colours)
        run: npm run check:palette
      - name: DS consistency guard (no tabler / !h- / arbitrary px radius)
        run: npm run check:ds
      - name: Type check
        run: npm run typecheck
      - name: Test + coverage
        run: npm test -- --coverage
      - name: Build
        run: npm run build
      - name: Security audit
        run: npm audit --omit=dev --audit-level=high

  # CAM-230 B4 — Advisory visual-regression + axe a11y gate.
  # Runs Playwright against the production build in a Linux Chromium environment.
  # `continue-on-error: true` = pixel diffs / a11y findings produce a reviewable
  # artifact and a warning annotation, but NEVER block a merge.
  # Results (report + diff images) are uploaded as a CI artifact for review.
  # Cross-OS note: baselines committed from macOS will differ from this Linux runner;
  # see e2e/README.md for how to update Linux-native baselines.
  visual-a11y:
    runs-on: ubuntu-latest
    # Run independently of quality-gate; do not block if quality-gate fails.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # Use the same install strategy as quality-gate (honors lock, avoids wasm32 issue).
      - run: npm install --no-audit --no-fund
      - name: Install Playwright Chromium + OS deps
        run: npx playwright install --with-deps chromium
      - name: Build (production)
        run: npm run build
        env:
          # Suppress DB-connect errors during build (same as vercel-build pattern).
          # Prisma generate runs inside `npm run build`; no migration needed here.
          SKIP_ENV_VALIDATION: "1"
      - name: Run Playwright (visual + a11y)
        run: npx playwright test
        env:
          # Point at the production build started by the webServer config.
          # SKIP_BUILD=1 tells playwright.config.ts to only `npm run start`
          # (the build was already done above).
          SKIP_BUILD: "1"
          CI: "true"
      - name: Upload Playwright report + diff images
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  # Post-deploy smoke against the env's live URL. Opt-in: set repo variables
  # STAGING_URL / PROD_URL (Settings → Secrets and variables → Actions → Variables).
  # If the matching var is unset it skips (so main pushes never fail before staging exists).
  smoke:
    needs: quality-gate
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Smoke (curl deployed URL if configured)
        run: |
          URL=""
          [ "${{ github.ref_name }}" = "main" ] && URL="${{ vars.PROD_URL }}"
          [ "${{ github.ref_name }}" = "staging" ] && URL="${{ vars.STAGING_URL }}"
          if [ -z "$URL" ]; then
            echo "::notice::No URL variable for '${{ github.ref_name }}' — skipping smoke."
            exit 0
          fi
          echo "Smoking $URL (waits for Vercel deploy) ..."
          for i in $(seq 1 12); do
            code=$(curl -s -o /dev/null -w '%{http_code}' "$URL" || true)
            echo "attempt $i: HTTP $code"
            [ "$code" = "200" ] && echo "✓ smoke ok" && exit 0
            sleep 15
          done
          echo "::error::Smoke failed for $URL (no HTTP 200 within ~3min)"
          exit 1
