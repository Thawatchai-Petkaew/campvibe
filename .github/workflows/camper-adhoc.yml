name: Camper → ad-hoc (free-form request)

# Fired by app/api/telegram-webhook (repository_dispatch) when you message the bot
# something that isn't a gate reply — i.e. a free-form /camper request. Runs the
# orchestrator headlessly to scope + act (draft PR only; respects gates + cost rule).
on:
  repository_dispatch:
    types: [camper-adhoc]
  workflow_dispatch:
    inputs:
      text:
        description: "Free-form request for the orchestrator"
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  adhoc:
    runs-on: ubuntu-latest
    # Job-level so the `if:` below can read it (workflow/job env only — not step env).
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install --no-audit --no-fund

      - name: Provision .env for tools
        run: |
          printf 'LINEAR_API_KEY=%s\nLINEAR_TEAM_KEY=%s\n' \
            "${{ secrets.LINEAR_API_KEY }}" "${{ vars.LINEAR_TEAM_KEY || 'CAM' }}" > .env

      - name: Run the orchestrator on the request
        if: env.ANTHROPIC_API_KEY != ''
        env:
          REQUEST: ${{ github.event.client_payload.text || github.event.inputs.text }}
        run: |
          npm i -g @anthropic-ai/claude-code
          claude -p "Role: CampVibe orchestrator (read CLAUDE.md + docs/project/* + ai-planning/SYNC-ARCHITECTURE.md first).
          Ad-hoc request from the owner via /camper: \"$REQUEST\".
          Scope it with lightweight Discovery, then act via the normal gates. Hard rules: work on a NEW branch only, never touch main; if there is code, open a **draft PR** (never merge); respect the Camper Agent autopilot flag ('npm run camper status') and the COST RULE — any monetary cost (paid API, infra, prod deploy, real messages) means STOP and ask, do not proceed. Update Linear per transition with 'node scripts/linear-sync.mjs set <id> --state <state>'. Finish with a short summary + PR link." \
            --dangerously-skip-permissions

      - name: No API key → log only
        if: env.ANTHROPIC_API_KEY == ''
        run: |
          echo "::notice::Ad-hoc /camper request received but ANTHROPIC_API_KEY is not set." \
               "Set the secret to enable headless runs, or pick it up in a session."
